name: Wdrożenie na GitHub Pages

on:
  push:
    branches: ["main", "master"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4

      - name: Instalacja Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalacja zależności
        run: npm install --legacy-peer-deps

      - name: Build projektu
        run: npm run build

      - name: Upload do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist   # albo ./build (zależy od projektu!)

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4